<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ Fight or Run</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0800;--wood:#1a0f05;--wood-l:#2a1a0a;--copper:#B87333;
  --sun:#FFD700;--cream:#FFF8DC;--fire:#FF3300;--teal:#20B2AA;--red:#DC143C;
}
body{background:var(--bg);font-family:'Oswald',sans-serif;color:var(--cream);min-height:100vh;overflow-x:hidden;user-select:none}
#bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 30% 95%,rgba(101,67,33,.25) 0%,transparent 45%),radial-gradient(ellipse at 70% 97%,rgba(139,69,19,.3) 0%,transparent 40%),linear-gradient(180deg,#2a1a0a,#3a2510,#4a3215,#5a3f1a)}

#app{max-width:450px;margin:0 auto;padding:15px;position:relative;z-index:10;display:flex;flex-direction:column;gap:15px;min-height:100vh;justify-content:center}
.title{font-family:'Rye',cursive;font-size:2.5rem;color:var(--sun);text-align:center;text-shadow:0 0 30px rgba(255,215,0,.7),3px 3px 0 var(--fire)}
.sub{font-size:.6rem;color:var(--copper);text-align:center;letter-spacing:4px;text-transform:uppercase}

#curr-bar{background:linear-gradient(135deg,rgba(30,18,8,.95),rgba(50,30,15,.95));border:2px solid var(--copper);border-radius:14px;padding:14px;display:flex;justify-content:space-between}
.curr-item{display:flex;flex-direction:column;align-items:center}
.curr-lbl{font-size:.45rem;color:var(--copper);text-transform:uppercase;letter-spacing:2px}
.curr-val{font-size:1.2rem;font-weight:700;color:var(--sun)}

#arena{background:linear-gradient(180deg,var(--wood),#1a1008);border:4px solid var(--copper);border-radius:16px;padding:20px;text-align:center;position:relative;overflow:hidden}
.enemy-display{font-size:5rem;margin:20px 0;animation:enemy-shake 2s infinite}
@keyframes enemy-shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.enemy-name{font-family:'Rye',cursive;font-size:1.8rem;color:var(--sun);margin:10px 0;text-shadow:0 0 15px rgba(255,215,0,.5)}
.enemy-stats{display:flex;justify-content:center;gap:15px;margin:15px 0}
.stat-item{text-align:center}
.stat-lbl{font-size:.6rem;color:var(--copper);text-transform:uppercase;letter-spacing:1px}
.stat-val{font-size:1.2rem;font-weight:700;color:var(--sun)}

#choices{display:flex;justify-content:center;gap:20px;margin:20px 0}
.choice{background:rgba(0,0,0,.5);border:3px solid var(--copper);border-radius:50%;width:80px;height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:2rem;cursor:pointer;transition:all .2s}
.choice:hover:not(.disabled){transform:scale(1.1)}
.choice.selected{border-color:var(--sun);box-shadow:0 0 20px var(--sun)}
.choice.disabled{opacity:.4;pointer-events:none}
.choice-lbl{font-size:.6rem;margin-top:5px;color:var(--copper);text-transform:uppercase}

#bet-section{background:linear-gradient(180deg,var(--wood),#1a1008);border:3px solid var(--copper);border-radius:16px;padding:15px;text-align:center}
.bet-label{font-size:.6rem;color:var(--copper);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
.bet-row{display:flex;align-items:center;justify-content:center;gap:12px}
.bet-btn{width:32px;height:32px;border-radius:6px;background:var(--wood-l);border:2px solid var(--copper);color:var(--sun);font-weight:700;cursor:pointer}
#bet-disp{background:rgba(0,0,0,.6);border:2px solid var(--copper);border-radius:8px;padding:8px 20px;color:var(--sun);font-weight:700;font-size:1.2rem;min-width:80px}

#spin-btn{width:100%;padding:18px;background:linear-gradient(180deg,#FF9500,#CC3300,#880000);border:3px solid var(--sun);border-radius:40px;color:var(--cream);font-family:'Rye',cursive;font-size:1.4rem;cursor:pointer;box-shadow:0 6px 0 #550000,0 0 30px rgba(255,100,0,.4);transition:all .1s}
#spin-btn:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 9px 0 #550000,0 0 50px rgba(255,140,0,.6)}
#spin-btn:active:not(:disabled){transform:translateY(3px);box-shadow:0 3px 0 #550000}
#spin-btn:disabled{opacity:.5;cursor:not-allowed}

#result-area{min-height:60px;background:rgba(0,0,0,.4);border:2px solid var(--copper);border-radius:12px;padding:12px;text-align:center}
.result-txt{font-family:'Rye',cursive;font-size:1.5rem;color:var(--sun)}
.result-sub{font-size:.8rem;color:var(--copper);margin-top:5px}

#streak-bar{background:rgba(0,0,0,.5);border-radius:8px;padding:8px;margin-top:10px;display:none}
.streak-bar.show{display:block}
.streak-lbl{font-size:.55rem;color:var(--teal);text-transform:uppercase;letter-spacing:2px;text-align:center}
.streak-num{font-size:1.8rem;font-weight:700;color:var(--teal);text-align:center;font-family:'Rye',cursive}

#win-anim{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Rye',cursive;font-size:4rem;color:var(--sun);text-shadow:0 0 50px var(--sun);z-index:100;display:none;pointer-events:none}
#win-anim.show{display:block;animation:win-pop 1s}
@keyframes win-pop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}30%{transform:translate(-50%,-50%) scale(1.3);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(28,15,5,.97);border:2px solid var(--copper);border-radius:10px;padding:12px 24px;color:var(--sun);z-index:200;display:none;white-space:pre-line}
#toast.show{display:block;animation:toast-in .3s}
@keyframes toast-in{from{transform:translateX(-50%) translateY(20px)}to{transform:translateX(-50%) translateY(0)}

@media(max-width:400px){.enemy-display{font-size:3.5rem}.choice{width:70px;height:70px;font-size:1.6rem}.title{font-size:2rem}}
</style>
</head>
<body>
<div id="bg"></div>

<div id="app">
  <div>
    <div class="title">⚔️ Fight or Run</div>
    <div class="sub">Battle Arena - Choose Your Fate</div>
  </div>

  <div id="curr-bar">
    <div class="curr-item"><div class="curr-lbl">💰 Beer Money</div><div class="curr-val" id="bm">$50.00</div></div>
    <div class="curr-item"><div class="curr-lbl">🏆 Wins</div><div class="curr-val" id="wins">0</div></div>
    <div class="curr-item"><div class="curr-lbl">🏃‍♂️ Runs</div><div class="curr-val" id="runs">0</div></div>
  </div>

  <div id="arena">
    <div class="enemy-display" id="enemy-display">🤖</div>
    <div class="enemy-name" id="enemy-name">Street Thug</div>
    <div class="enemy-stats">
      <div class="stat-item">
        <div class="stat-lbl">Strength</div>
        <div class="stat-val" id="enemy-strength">8</div>
      </div>
      <div class="stat-item">
        <div class="stat-lbl">Speed</div>
        <div class="stat-val" id="enemy-speed">7</div>
      </div>
      <div class="stat-item">
        <div class="stat-lbl">Health</div>
        <div class="stat-val" id="enemy-health">10</div>
      </div>
    </div>

    <div id="choices">
      <div class="choice" id="choice-fight" onclick="choose('fight')">
        ⚔️
        <div class="choice-lbl">Fight</div>
      </div>
      <div class="choice" id="choice-run" onclick="choose('run')">
        🏃‍♂️
        <div class="choice-lbl">Run</div>
      </div>
    </div>
  </div>

  <div id="bet-section">
    <div class="bet-label">Your Bet Amount</div>
    <div class="bet-row">
      <button class="bet-btn" onclick="adjBet(-5)">−</button>
      <div id="bet-disp">$10.00</div>
      <button class="bet-btn" onclick="adjBet(5)">+</button>
    </div>
  </div>

  <button id="spin-btn" onclick="engage()">⚔️ ENGAGE! ⚔️</button>

  <div id="result-area">
    <div class="result-txt" id="result-txt">Choose Fight or Run!</div>
    <div class="result-sub" id="result-sub">Face your enemy in the arena!</div>
  </div>

  <div id="streak-bar">
    <div class="streak-lbl">🔥 Victory Streak! 🔥</div>
    <div class="streak-num" id="streak-num">0</div>
  </div>

  <div style="display:flex;justify-content:center;gap:8px;margin-top:10px">
    <button style="padding:10px 20px;background:var(--wood-l);border:2px solid var(--copper);border-radius:8px;color:var(--copper);font-size:.8rem;cursor:pointer" onclick="window.location.href='index.html'">🏠 Home</button>
  </div>
</div>

<div id="win-anim"></div>
<div id="toast"></div>

<script>
const ENEMIES = [
  { name: 'Street Thug', emoji: '🤖', strength: 8, speed: 7, health: 10, reward: 2 },
  { name: 'Bar Brawler', emoji: '🥊', strength: 9, speed: 6, health: 12, reward: 2.5 },
  { name: 'Gang Member', emoji: '🔪', strength: 7, speed: 8, health: 8, reward: 1.8 },
  { name: 'Boxing Champ', emoji: '🥋', strength: 10, speed: 5, health: 15, reward: 3 },
  { name: 'Ninja Assassin', emoji: '🥷', strength: 6, speed: 10, health: 7, reward: 2.2 },
  { name: 'Wrestler', emoji: '🤼', strength: 9, speed: 4, health: 18, reward: 3.5 },
  { name: 'Karate Master', emoji: '🥋', strength: 8, speed: 9, health: 11, reward: 2.8 },
  { name: 'Sumo Fighter', emoji: '🤼', strength: 11, speed: 3, health: 20, reward: 4 }
];

const G = {
  bet:10,
  choice:'fight',
  beerMoney:50,
  wins:0,
  runs:0,
  streak:0,
  currentEnemy: null,
  reserves:90
};

const el = id => document.getElementById(id);

function init(){
  load();
  spawnEnemy();
  refreshUI();
}

function load(){
  const d = JSON.parse(localStorage.getItem('fightrun_data') || '{}');
  G.beerMoney = d.beerMoney || 50;
  G.wins = d.wins || 0;
  G.runs = d.runs || 0;
}

function save(){
  localStorage.setItem('fightrun_data', JSON.stringify({beerMoney:G.beerMoney,wins:G.wins,runs:G.runs}));
}

function choose(action){
  G.choice = action;
  el('choice-fight').classList.toggle('selected', action === 'fight');
  el('choice-run').classList.toggle('selected', action === 'run');
}

function adjBet(d){
  G.bet = Math.max(5, Math.min(G.beerMoney, G.bet + d));
  el('bet-disp').textContent = '$' + G.bet.toFixed(2);
}

function spawnEnemy(){
  G.currentEnemy = ENEMIES[Math.floor(Math.random() * ENEMIES.length)];
  el('enemy-display').textContent = G.currentEnemy.emoji;
  el('enemy-name').textContent = G.currentEnemy.name;
  el('enemy-strength').textContent = G.currentEnemy.strength;
  el('enemy-speed').textContent = G.currentEnemy.speed;
  el('enemy-health').textContent = G.currentEnemy.health;
}

function engage(){
  if(G.beerMoney < G.bet){
    toast('Not enough Beer Money! 💰');
    return;
  }

  el('spin-btn').disabled = true;
  G.beerMoney -= G.bet;
  refreshUI();

  // Battle calculation
  let result, winAmount = 0;

  if(G.choice === 'fight'){
    // Fighting logic
    const playerPower = Math.random() * 15 + 5; // 5-20
    const enemyPower = G.currentEnemy.strength + G.currentEnemy.speed + (G.currentEnemy.health * 0.5);
    const playerWins = playerPower > enemyPower * 0.8;

    if(playerWins){
      const multiplier = G.currentEnemy.reward;
      winAmount = Math.floor(G.bet * multiplier);
      result = `VICTORY! Defeated ${G.currentEnemy.name}!`;
      G.wins++;
      G.streak++;
    }else{
      result = `DEFEAT! ${G.currentEnemy.name} was too strong!`;
      G.streak = 0;
    }
  }else{
    // Running logic
    const runChance = Math.random();
    if(runChance > 0.3){ // 70% success rate
      winAmount = Math.floor(G.bet * 0.5); // Get half back
      result = `ESCAPED! Got away safely!`;
      G.runs++;
    }else{
      result = `CAUGHT! Couldn't escape!`;
      G.streak = 0;
    }
  }

  // Apply house protection
  const houseEdge = Math.floor(winAmount * 0.88); // 12% house edge
  const maxPay = G.reserves + 20;
  const safeWin = houseEdge > maxPay ? maxPay : houseEdge;
  G.reserves = Math.max(0, G.reserves - safeWin);
  G.beerMoney += safeWin;

  el('result-txt').textContent = result + (safeWin > 0 ? ` +$${safeWin}` : '');
  el('result-sub').textContent = G.choice === 'fight' ? 'Battle complete!' : 'Tactical retreat!';

  if(safeWin > 0){
    showWinAnim(safeWin);
    toast(`${result} +$${safeWin}! ${G.choice === 'fight' ? '🏆' : '🏃‍♂️'}`);
  }else{
    toast(result);
  }

  // Streak display
  el('streak-bar').classList.toggle('show', G.streak >= 3);
  if(G.streak >= 3) el('streak-num').textContent = G.streak;

  save();
  refreshUI();

  if(G.reserves < 40) toast('Arena reserves running low!', 4000);

  // Reset for next round
  setTimeout(() => {
    spawnEnemy();
    el('spin-btn').disabled = false;
    el('result-txt').textContent = 'Choose Fight or Run!';
    el('result-sub').textContent = 'Face your enemy in the arena!';
  }, 2500);
}

function showWinAnim(amt){
  const a = el('win-anim');
  a.textContent = '+$' + amt.toFixed(2);
  a.classList.add('show');
  setTimeout(() => a.classList.remove('show'), 1500);
}

function refreshUI(){
  el('bm').textContent = '$' + G.beerMoney.toFixed(2);
  el('wins').textContent = G.wins;
  el('runs').textContent = G.runs;
}

let tt;
function toast(msg){
  const t = el('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(tt);
  tt = setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>

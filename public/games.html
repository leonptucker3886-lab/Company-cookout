<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🥊 Ray vs Matt</title>
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0c0400;--wood:#1C0F05;--wood-l:#3A200A;--copper:#B87333;
    --sun:#FFD700;--cream:#FFF8DC;--fire:#FF3300;--green:#39FF14;--red:#FF4444;
  }
  body{background:var(--bg);font-family:'Oswald',sans-serif;color:var(--cream);min-height:100vh;overflow-x:hidden}
  #bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 95%,rgba(101,67,33,.35) 0%,transparent 50%),linear-gradient(180deg,#2a1a0a,#3a2510,#4a3215,#5a3f1a)}
  #embers{position:fixed;inset:0;z-index:1;overflow:hidden;pointer-events:none}
  .ember{position:absolute;bottom:3%;border-radius:50%;animation:rise linear infinite}
  @keyframes rise{0%{opacity:1;transform:translateY(0) translateX(0)}70%{opacity:.5}100%{opacity:0;transform:translateY(-60vh) translateX(var(--dx))}}
  .flame{position:fixed;bottom:0;width:60px;height:120px;pointer-events:none;z-index:2;opacity:.4}
  .flame.l{left:0}.flame.r{right:0}
  .flame::before{content:'';position:absolute;bottom:0;left:15px;width:30px;height:80px;background:radial-gradient(ellipse,rgba(255,140,0,.5),transparent);border-radius:50% 50% 30% 30%;animation:flicker .8s ease-in-out infinite alternate}
  @keyframes flicker{from{transform:scaleY(1)}to{transform:scaleY(.85)}}

  #app{max-width:600px;margin:0 auto;padding:15px;position:relative;z-index:10;display:flex;flex-direction:column;gap:12px}
  .title{font-family:'Rye',cursive;font-size:2.2rem;color:var(--sun);text-align:center;text-shadow:0 0 20px rgba(255,215,0,.5),2px 2px 0 var(--fire)}
  .sub{font-size:.65rem;color:var(--copper);text-align:center;letter-spacing:3px;text-transform:uppercase}

  #arena{background:linear-gradient(135deg,var(--wood),#200e00);border:3px solid var(--copper);border-radius:14px;padding:20px;display:flex;justify-content:space-between;align-items:center;margin:10px 0}
  .fighter{text-align:center}
  .fighter img{width:80px;height:80px;border-radius:50%;border:3px solid var(--copper);margin-bottom:10px}
  .name{font-size:1rem;color:var(--sun);font-weight:700}
  .health-bar{background:rgba(0,0,0,.5);border:2px solid var(--copper);border-radius:10px;width:100px;height:15px;margin:5px auto}
  .health-fill{background:var(--green);height:100%;border-radius:8px;transition:width .3s}
  .health-fill.low{background:var(--red)}

  #pick-controls{display:flex;gap:10px;justify-content:center}
  #controls{display:none;flex-direction:column;gap:10px;text-align:center}
  .btn{background:linear-gradient(180deg,#FF9500,#CC2000);border:2px solid var(--sun);border-radius:25px;padding:12px 24px;color:var(--cream);font-family:'Rye',cursive;font-size:1rem;cursor:pointer;box-shadow:0 4px 0 #800;transition:all .1s}
  .btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 0 #800}
  .btn:active:not(:disabled){transform:translateY(2px);box-shadow:0 2px 0 #800}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  #msg{background:rgba(0,0,0,.4);border:1px solid var(--copper);border-radius:8px;padding:10px;text-align:center;font-size:.85rem;color:var(--cream)}

  #nav{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .nav-btn{padding:8px 16px;background:linear-gradient(135deg,var(--wood-l),var(--wood));border:2px solid var(--copper);border-radius:8px;color:var(--copper);font-size:.7rem;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
  .nav-btn:hover{border-color:var(--sun);color:var(--sun)}

  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(28,15,5,.97);border:2px solid var(--copper);border-radius:10px;padding:12px 24px;color:var(--sun);z-index:200;display:none;font-size:.9rem}
  #toast.show{display:block;animation:toast-in .3s}
  @keyframes toast-in{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1)}
  </style>
</head>
<body>
<div id="bg"></div>
<div id="embers"></div>
<div class="flame l"></div>
<div class="flame r"></div>

<div id="app">
  <div>
    <div class="title">🥊 Ray vs Matt</div>
    <div class="sub">Trailer Park Brawl</div>
  </div>

  <div id="arena">
    <div class="fighter" id="ray">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23FFD700'/%3E%3Ctext x='50' y='55' text-anchor='middle' font-size='40' fill='%23000'%3ER%3C/text%3E%3C/svg%3E" alt="Ray">
      <div class="name">Ray</div>
      <div class="health-bar"><div class="health-fill" id="ray-health" style="width:100%"></div></div>
    </div>
    <div style="font-size:3rem;color:var(--fire)">VS</div>
    <div class="fighter" id="matt">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23FFD700'/%3E%3Ctext x='50' y='55' text-anchor='middle' font-size='40' fill='%23000'%3EM%3C/text%3E%3C/svg%3E" alt="Matt">
      <div class="name">Matt</div>
      <div class="health-bar"><div class="health-fill" id="matt-health" style="width:100%"></div></div>
    </div>
  </div>

  <div id="pick-controls">
    <div class="btn" onclick="pickWinner('ray')">PICK RAY TO WIN! 👊</div>
    <div class="btn" onclick="pickWinner('matt')">PICK MATT TO WIN! 👊</div>
  </div>

  <div id="controls">
    <div class="btn" id="attack-btn" onclick="attack()">ATTACK! 🥊</div>
  </div>

  <div id="msg">Pick who you think will win! 🎯</div>

  <div id="nav">
    <button class="nav-btn" onclick="window.location.href='games.html'">🏠 Home</button>
    <button class="nav-btn" onclick="window.location.href='games.html'">🎰 Games</button>
  </div>
</div>

<div id="toast"></div>

<script>
let rayHealth = 100;
let mattHealth = 100;
let turn = 'ray';
let pickedWinner = null;

function init(){
  spawnEmbers();
  updateUI();
}

function spawnEmbers(){
  const con = document.getElementById('embers');
  for(let i=0;i<15;i++){
    const e = document.createElement('div');
    e.className = 'ember';
    const sz = 2+Math.random()*4;
    e.style.cssText = `left:${5+Math.random()*90}%;width:${sz}px;height:${sz}px;background:rgba(255,130,0,.8);--dx:${(Math.random()-.5)*80}px;animation-duration:${3+Math.random()*4}s;animation-delay:-${Math.random()*5}s`;
    con.appendChild(e);
  }
}

function pickWinner(winner){
  pickedWinner = winner;
  document.getElementById('pick-controls').style.display = 'none';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('msg').textContent = 'Fight starts! Click Attack!';
}

function attack(){
  const rand = Math.random();
  if(turn === 'ray'){
    if(rand < 0.05){
      // Ray grabs Matt
      const damage = 20;
      mattHealth = Math.max(0, mattHealth - damage);
      toast(`Ray grabs Matt for ${damage} damage! Matt skips turn! 🤲`);
      // Turn stays Ray
    }else if(rand < 0.07){
      // Ray gets April
      toast(`Ray gets the April trump card! Ray wins instantly! 👑`);
      mattHealth = 0;
      updateUI();
      endGame();
      return;
    }else{
      const damage = Math.floor(Math.random() * 20) + 10;
      mattHealth = Math.max(0, mattHealth - damage);
      toast(`Ray punches Matt for ${damage} damage! 💥`);
      turn = 'matt';
    }
  }else{
    if(rand < 0.05){
      // Matt calls in liquor
      const heal = 30;
      mattHealth = Math.min(100, mattHealth + heal);
      toast(`Matt calls in liquor! Heals ${heal} health! 🍺`);
      turn = 'ray';
    }else if(rand < 0.15){
      // Matt uses Poppin sling
      const damage = 40;
      rayHealth = Math.max(0, rayHealth - damage);
      toast(`Matt uses Poppin sling for ${damage} damage! 🪃`);
      turn = 'ray';
    }else{
      const damage = Math.floor(Math.random() * 20) + 10;
      rayHealth = Math.max(0, rayHealth - damage);
      toast(`Matt punches Ray for ${damage} damage! 💥`);
      turn = 'ray';
    }
  }
  updateUI();
  if(rayHealth <= 0 || mattHealth <= 0){
    endGame();
  }
}

function updateUI(){
  document.getElementById('ray-health').style.width = rayHealth + '%';
  document.getElementById('matt-health').style.width = mattHealth + '%';
  if(rayHealth < 30) document.getElementById('ray-health').classList.add('low');
  if(mattHealth < 30) document.getElementById('matt-health').classList.add('low');
  if(pickedWinner){
    document.getElementById('msg').textContent = turn === 'ray' ? "Ray's turn!" : "Matt's turn!";
  }
}

function endGame(){
  document.getElementById('attack-btn').disabled = true;
  let winner = rayHealth <= 0 ? 'matt' : 'ray';
  let winMsg = winner === 'ray' ? 'Ray wins! Matt is down! 🏆' : 'Matt wins! Ray is down! 🏆';
  if(pickedWinner === winner){
    winMsg += ' You picked right! 🎉';
  }else if(pickedWinner){
    winMsg += ' Wrong pick! 😅';
  }
  toast(winMsg);
  setTimeout(() => {
    rayHealth = 100;
    mattHealth = 100;
    turn = 'ray';
    pickedWinner = null;
    updateUI();
    document.getElementById('attack-btn').disabled = false;
    document.getElementById('controls').style.display = 'none';
    document.getElementById('pick-controls').style.display = 'flex';
    document.getElementById('msg').textContent = 'Pick who you think will win! 🎯';
    toast('New round! Pick again! 🥊');
  }, 4000);
}

let toastT;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2800);
}

init();
</script>
</body>
</html></content>

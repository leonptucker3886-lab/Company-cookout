<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💥 Shannon Cannon</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0500;--wood:#1a1008;--wood-l:#2a1a0a;--copper:#B87333;
  --sun:#FFD700;--cream:#FFF8DC;--fire:#FF3300;--blue:#4169E1;--green:#39FF14;
}
body{background:var(--bg);font-family:'Oswald',sans-serif;color:var(--cream);min-height:100vh;overflow:hidden}
#bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 50% 95%,rgba(101,67,33,.35) 0%,transparent 50%),linear-gradient(180deg,#2a1a0a,#3a2510,#4a3215,#5a3f1a)}

#app{max-width:600px;margin:0 auto;padding:15px;position:relative;z-index:10;display:flex;flex-direction:column;gap:12px}
.title{font-family:'Rye',cursive;font-size:2.2rem;color:var(--sun);text-align:center;text-shadow:0 0 25px rgba(255,215,0,.6)}
.sub{font-size:.6rem;color:var(--copper);text-align:center;letter-spacing:4px;text-transform:uppercase;margin-bottom:10px}

#stats-bar{background:linear-gradient(135deg,rgba(30,18,8,.95),rgba(50,30,15,.95));border:2px solid var(--copper);border-radius:12px;padding:12px;display:flex;justify-content:space-between}
.stat-item{display:flex;flex-direction:column;align-items:center}
.stat-lbl{font-size:.45rem;color:var(--copper);text-transform:uppercase;letter-spacing:2px}
.stat-val{font-size:1.1rem;font-weight:700;color:var(--sun)}

#game-area{position:relative;width:100%;height:300px;background:linear-gradient(180deg,#87CEEB,#98FB98,#228B22);border:4px solid var(--copper);border-radius:12px;overflow:hidden;margin:10px 0}
#ground{position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(180deg,#8B4513,#654321);border-top:2px solid #654321}
#hill{position:absolute;bottom:40px;left:0;width:150px;height:60px;background:#228B22;border-radius:50% 50% 0 0}
#cannon{position:absolute;bottom:60px;left:20px;width:60px;height:30px;background:#654321;border-radius:10px;display:flex;align-items:center;padding:0 10px}
.cannon-barrel{position:absolute;left:50px;bottom:65px;width:40px;height:8px;background:#333;border-radius:4px;transform-origin:left center;transform:rotate(var(--angle, 45deg))}
#cannon-base{position:absolute;bottom:40px;left:35px;width:20px;height:20px;background:#333;border-radius:50%}

#truck{position:absolute;bottom:50px;font-size:2rem;z-index:10;transform-origin:center}
.truck-exploding{animation:explode 1s ease-out forwards}
@keyframes explode{0%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.5) rotate(180deg)}100%{transform:scale(0.1) rotate(360deg);opacity:0}}

#trajectory{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
.trajectory-dot{position:absolute;width:3px;height:3px;background:var(--fire);border-radius:50%;opacity:.8}

#controls{display:flex;gap:10px;justify-content:center;margin:15px 0}
.btn{background:linear-gradient(180deg,#FF9500,#CC3300);border:2px solid var(--sun);border-radius:25px;padding:12px 20px;color:var(--cream);font-family:'Rye',cursive;font-size:.9rem;cursor:pointer;box-shadow:0 4px 0 #800;transition:all .1s}
.btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 0 #800}
.btn:active:not(:disabled){transform:translateY(2px);box-shadow:0 2px 0 #800}
.btn:disabled{opacity:.5;cursor:not-allowed}

#angle-slider{margin:10px auto;width:200px;display:block}
.slider-container{text-align:center;margin:10px 0}
.slider-label{font-size:.8rem;color:var(--copper);margin-bottom:5px}

#power-indicator{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.7);padding:8px;border-radius:8px;font-size:.8rem}
#distance-display{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.7);padding:8px;border-radius:8px;font-size:.8rem}

#message{text-align:center;font-size:.9rem;color:var(--cream);margin:10px 0;min-height:30px}

#result-screen{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(180deg,var(--wood-l),var(--wood));border:4px solid var(--copper);border-radius:20px;padding:30px;text-align:center;z-index:200;display:none;max-width:400px;width:90%}
.result-title{font-family:'Rye',cursive;font-size:2.5rem;color:var(--sun);margin-bottom:15px}
.result-amount{font-size:2rem;color:var(--green);font-weight:700;margin-bottom:20px;font-family:'Rye',cursive}
.result-btn{background:linear-gradient(135deg,#FFD700,#FFA500);border:3px solid var(--sun);border-radius:15px;padding:12px 25px;color:#000;font-family:'Rye',cursive;font-size:1.2rem;cursor:pointer;margin:5px}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(28,15,5,.97);border:2px solid var(--copper);border-radius:10px;padding:12px 24px;color:var(--sun);z-index:300;display:none}
#toast.show{display:block;animation:toast-in .3s}
@keyframes toast-in{from{transform:translateX(-50%) translateY(20px)}to{transform:translateX(-50%) translateY(0)}

@media(max-width:450px){#game-area{height:250px}#angle-slider{width:150px}}
</style>
</head>
<body>
<div id="bg"></div>

<div id="app">
  <div>
    <div class="title">💥 Shannon Cannon</div>
    <div class="sub">Shoot FedEx Trucks Into Orbit!</div>
  </div>

  <div id="stats-bar">
    <div class="stat-item"><div class="stat-lbl">💰 Money</div><div class="stat-val" id="money">$50.00</div></div>
    <div class="stat-item"><div class="stat-lbl">🎯 Best Distance</div><div class="stat-val" id="best">0m</div></div>
    <div class="stat-item"><div class="stat-lbl">🏆 Total Won</div><div class="stat-val" id="total">$0.00</div></div>
  </div>

  <div id="game-area">
    <div id="ground"></div>
    <div id="hill"></div>
    <div id="cannon">
      <div>🔫</div>
    </div>
    <div class="cannon-barrel"></div>
    <div id="cannon-base"></div>
    <div id="truck">📦</div>
    <div id="trajectory"></div>
    <div id="power-indicator">Power: 50</div>
    <div id="distance-display">Distance: 0m</div>
  </div>

  <div class="slider-container">
    <div class="slider-label">Cannon Angle: <span id="angle-value">45°</span></div>
    <input type="range" id="angle-slider" min="0" max="90" value="45">
  </div>

  <div id="controls">
    <button class="btn" onclick="adjPower(-5)">Power -</button>
    <button class="btn" id="fire-btn" onclick="fireCannon()">💥 FIRE!</button>
    <button class="btn" onclick="adjPower(5)">Power +</button>
  </div>

  <div id="message">Adjust angle and power, then fire the FedEx truck!</div>

  <div style="text-align:center;margin-top:10px">
    <button style="padding:10px 20px;background:var(--wood-l);border:2px solid var(--copper);border-radius:8px;color:var(--copper);font-size:.8rem;cursor:pointer" onclick="window.location.href='index.html'">🏠 Home</button>
  </div>
</div>

<div id="result-screen">
  <div class="result-title" id="result-title">Truck Launched!</div>
  <div class="result-amount" id="result-amount">Distance: 0m</div>
  <div style="display:flex;gap:10px;justify-content:center">
    <button class="result-btn" onclick="resetGame()">🔄 FIRE AGAIN</button>
    <button class="result-btn" onclick="window.location.href='index.html'">🏠 HOME</button>
  </div>
</div>

<div id="toast"></div>

<script>
const G = {
  money: 50,
  bet: 5,
  bestDistance: 0,
  totalWon: 0,
  reserves: 80,
  power: 50,
  angle: 45
};

let truckFlying = false;
let truckX = 80;
let truckY = 240;
let velocityX = 0;
let velocityY = 0;
let gravity = 0.3;
let maxDistance = 0;
let trajectoryPoints = [];

function init(){
  load();
  setupCannon();
  updateUI();
}

function load(){
  const d = JSON.parse(localStorage.getItem('shannon_data') || '{}');
  G.money = d.money || 50;
  G.bestDistance = d.bestDistance || 0;
  G.totalWon = d.totalWon || 0;
}

function save(){
  localStorage.setItem('shannon_data', JSON.stringify({money:G.money,bestDistance:G.bestDistance,totalWon:G.totalWon}));
}

function setupCannon(){
  updateCannonAngle();
  resetTruck();
}

function updateCannonAngle(){
  const angle = document.getElementById('angle-slider').value;
  G.angle = angle;
  document.getElementById('angle-value').textContent = angle + '°';
  document.documentElement.style.setProperty('--angle', angle + 'deg');
}

function adjPower(delta){
  G.power = Math.max(10, Math.min(100, G.power + delta));
  document.getElementById('power-indicator').textContent = 'Power: ' + G.power;
}

function fireCannon(){
  if(truckFlying || G.money < G.bet) return;

  G.money -= G.bet;
  updateUI();

  truckFlying = true;
  document.getElementById('fire-btn').disabled = true;

  // Calculate initial velocity
  const angleRad = (G.angle * Math.PI) / 180;
  const powerMultiplier = G.power / 50; // Normalize power
  velocityX = Math.cos(angleRad) * powerMultiplier * 8;
  velocityY = -Math.sin(angleRad) * powerMultiplier * 8;

  maxDistance = 0;
  trajectoryPoints = [];

  document.getElementById('message').textContent = 'Truck launched! Watch it fly! 🚀';

  flyTruck();
}

function flyTruck(){
  if(!truckFlying) return;

  // Physics
  velocityY += gravity;
  truckX += velocityX;
  truckY += velocityY;

  // Update max distance
  const distance = Math.max(0, (truckX - 80) / 2); // Convert pixels to meters
  maxDistance = Math.max(maxDistance, distance);
  document.getElementById('distance-display').textContent = 'Distance: ' + Math.round(distance) + 'm';

  // Add trajectory point
  if(Math.random() < 0.3){ // Add points occasionally
    const point = document.createElement('div');
    point.className = 'trajectory-dot';
    point.style.left = truckX + 'px';
    point.style.top = truckY + 'px';
    document.getElementById('trajectory').appendChild(point);
    trajectoryPoints.push(point);
  }

  // Update truck position
  const truck = document.getElementById('truck');
  truck.style.left = truckX + 'px';
  truck.style.top = truckY + 'px';

  // Check if truck hits ground
  if(truckY >= 240){
    landTruck();
    return;
  }

  // Check if truck goes off screen
  if(truckX > 650 || truckY > 350){
    crashTruck();
    return;
  }

  requestAnimationFrame(flyTruck);
}

function landTruck(){
  truckFlying = false;

  // Calculate score based on distance
  const score = Math.round(maxDistance);
  let multiplier = 1;

  if(score >= 200) multiplier = 10; // Amazing shot!
  else if(score >= 150) multiplier = 5; // Great shot!
  else if(score >= 100) multiplier = 3; // Good shot!
  else if(score >= 50) multiplier = 2; // Decent shot!

  const winAmount = G.bet * multiplier;

  // Apply house edge
  const houseWin = Math.floor(winAmount * 0.9);
  const safeWin = Math.min(houseWin, G.reserves);
  G.reserves = Math.max(0, G.reserves - safeWin);
  G.money += safeWin;

  if(safeWin > G.bestDistance * 0.1) G.bestDistance = Math.max(G.bestDistance, score);
  G.totalWon += Math.max(0, safeWin - G.bet);

  let resultText = 'Truck landed!';
  if(multiplier > 1) resultText = multiplier + 'x BONUS! ';

  showResult(resultText, score + 'm', safeWin);
}

function crashTruck(){
  truckFlying = false;

  // Truck crashes spectacularly
  const truck = document.getElementById('truck');
  truck.classList.add('truck-exploding');

  setTimeout(() => {
    // Small payout for the crash
    const crashWin = Math.floor(G.bet * 0.5);
    const safeWin = Math.min(crashWin, G.reserves);
    G.reserves = Math.max(0, G.reserves - safeWin);
    G.money += safeWin;

    showResult('Truck crashed!', Math.round(maxDistance) + 'm', safeWin);
  }, 1000);
}

function showResult(title, distance, amount){
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-amount').textContent = distance + (amount > 0 ? ' (+$' + amount.toFixed(2) + ')' : '');
  document.getElementById('result-screen').style.display = 'block';

  save();
  updateUI();
}

function resetGame(){
  document.getElementById('result-screen').style.display = 'none';

  // Clear trajectory
  trajectoryPoints.forEach(point => point.remove());
  trajectoryPoints = [];

  // Reset truck
  resetTruck();

  // Re-enable fire button
  document.getElementById('fire-btn').disabled = false;
  document.getElementById('message').textContent = 'Adjust angle and power, then fire the FedEx truck!';
}

function resetTruck(){
  truckX = 80;
  truckY = 240;
  const truck = document.getElementById('truck');
  truck.style.left = truckX + 'px';
  truck.style.top = truckY + 'px';
  truck.classList.remove('truck-exploding');
}

function updateUI(){
  document.getElementById('money').textContent = '$' + G.money.toFixed(2);
  document.getElementById('best').textContent = G.bestDistance + 'm';
  document.getElementById('total').textContent = '$' + G.totalWon.toFixed(2);
  document.getElementById('power-indicator').textContent = 'Power: ' + G.power;
}

// Event listeners
document.getElementById('angle-slider').addEventListener('input', updateCannonAngle);

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
